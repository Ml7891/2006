            gap: 9px;

        .checkbox-group label {

    </head>

        </div>

        <br><br>
        <button onclick="CheckAnswer()" style="font-size:36px; padding:10px 30px;">提交验证</button>

        <script>
        function CheckAnswer() {
        const rightmans = 49;
        const rightluo = "罗";
        const rightgender = "nv";
        const rightnames = ["1", "5", "15", "28", "49"];

        const mans = Number(document.getElementById("mans").value);
        const luo = document.getElementById("luo").value.trim();
        const gender = document.getElementById("gender").value;

        const names = Array.from(
            document.querySelectorAll(".checkbox-group input:checked")
        ).map(v => v.value);

        const wrong =
            mans !== rightmans ||
            luo !== rightluo ||
            gender !== rightgender ||
            names.length !== rightnames.length ||
            !rightnames.every(v => names.includes(v));

        if (wrong) {
            window.location.replace("error.html");
        } else {
            localStorage.setItem("pass_2006", "yes");
            window.location.replace("home.html");
        }
        }
        </script>

</html>
